parameters:
    braincrafted_bootstrap.form.type.collection.class: Braincrafted\Bundle\BootstrapBundle\Form\Type\BootstrapCollectionType
    braincrafted_bootstrap.form.type.money.class: Braincrafted\Bundle\BootstrapBundle\Form\Type\MoneyType
    braincrafted_bootstrap.form.type.form_actions.class: Braincrafted\Bundle\BootstrapBundle\Form\Type\FormActionsType
    braincrafted_bootstrap.form.type.form_static_control.class: Braincrafted\Bundle\BootstrapBundle\Form\Type\FormStaticControlType
    braincrafted_bootstrap.form.extension.typesetter_extension.class: Braincrafted\Bundle\BootstrapBundle\Form\Extension\TypeSetterExtension
    braincrafted_bootstrap.form.extension.button_extension.class: Braincrafted\Bundle\BootstrapBundle\Form\Extension\ButtonTypeExtension
    braincrafted_bootstrap.form.extension.static_control.class: Braincrafted\Bundle\BootstrapBundle\Form\Extension\StaticControlExtension
    braincrafted_bootstrap.form.extension.input_group_button.class: Braincrafted\Bundle\BootstrapBundle\Form\Extension\InputGroupButtonExtension

services:
    braincrafted_bootstrap.form.type.collection:
        class: '%braincrafted_bootstrap.form.type.collection.class%'
        tags:
            - { name: form.type, alias: bootstrap_collection }

    braincrafted_bootstrap.form.type.money:
        class: '%braincrafted_bootstrap.form.type.money.class%'
        tags:
            - { name: form.type, alias: money }

    braincrafted_bootstrap.form.type.form_actions:
        class: '%braincrafted_bootstrap.form.type.form_actions.class%'
        tags:
            - { name: form.type, alias: form_actions }

    braincrafted_bootstrap.form.type.form_control_static:
        class: '%braincrafted_bootstrap.form.type.form_static_control.class%'
        tags:
            - { name: form.type, alias: bs_static }

    braincrafted_bootstrap.form.extension.typesetter_extension:
        class: '%braincrafted_bootstrap.form.extension.typesetter_extension.class%'
        tags:
            - { name: form.type_extension, extended_type: Symfony\Component\Form\Extension\Core\Type\FormType, alias: form }

    braincrafted_bootstrap.form.extension.form_action_button:
        class: '%braincrafted_bootstrap.form.extension.button_extension.class%'
        tags:
            - { name: form.type_extension, extended_type: Symfony\Component\Form\Extension\Core\Type\ButtonType, alias: button }

    braincrafted_bootstrap.form.extension.static_control:
        class: '%braincrafted_bootstrap.form.extension.static_control.class%'
        tags:
            - { name: form.type_extension, extended_type: Symfony\Component\Form\Extension\Core\Type\FormType, alias: form }

    braincrafted_bootstrap.form.extension.input_group_button:
        class: '%braincrafted_bootstrap.form.extension.input_group_button.class%'
        tags:
            - { name: form.type_extension, extended_type: Symfony\Component\Form\Extension\Core\Type\TextType, alias: text }
